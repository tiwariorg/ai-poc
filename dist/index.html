<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hello World</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500&display=swap');

      *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: 'Inter', sans-serif;
      }

      .hero {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        padding: 2rem;
      }

      .card {
        background: rgba(255, 255, 255, 0.95);
        border-radius: 1.5rem;
        box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15);
        padding: 3rem 4rem;
        max-width: 600px;
        width: 100%;
        text-align: center;
        animation: fadeInUp 1s ease-out forwards;
      }

      h1 {
        font-family: 'Playfair Display', serif;
        font-size: 3.5rem;
        color: #2d3748;
        margin-bottom: 1rem;
        line-height: 1.2;
      }

      .divider {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.75rem;
        margin: 1.25rem 0;
      }

      .divider-line {
        height: 2px;
        width: 60px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        border-radius: 1px;
      }

      .divider-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      }

      .tagline {
        font-size: 1.25rem;
        color: #718096;
        line-height: 1.6;
        letter-spacing: 0.01em;
      }

      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @media (max-width: 768px) {
        .card {
          padding: 2rem 1.5rem;
        }

        h1 {
          font-size: 2.5rem;
        }
      }

      @media (max-width: 480px) {
        h1 {
          font-size: 2rem;
        }

        .tagline {
          font-size: 1rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="hero">
      <div class="card">
        <h1>Hello World</h1>
        <div class="divider" aria-hidden="true">
          <div class="divider-line"></div>
          <div class="divider-dot"></div>
          <div class="divider-line"></div>
        </div>
        <p class="tagline">Welcome to something beautiful.</p>
      </div>
    </div>
  </body>
</html>
