name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  # ── HTML validation ────────────────────────────────────────────────────────
  validate:
    name: Validate HTML
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify index.html exists
        run: test -f index.html

      - name: Verify index.html contains 'Hello World'
        run: grep -q 'Hello World' index.html

      - name: Verify index.html contains '<!DOCTYPE html>'
        run: grep -q '<!DOCTYPE html>' index.html

  # ── Build and test job (KAN-12) ───────────────────────────────────────────
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build project
        run: npm run build
