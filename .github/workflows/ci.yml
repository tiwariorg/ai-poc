name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  validate:
    name: Validate HTML
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify index.html exists
        run: test -f index.html

      - name: Verify index.html contains 'Hello World'
        run: grep -q 'Hello World' index.html

      - name: Verify index.html contains '<!DOCTYPE html>'
        run: grep -q '<!DOCTYPE html>' index.html

  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint
        continue-on-error: true

      - name: Run tests
        run: npm test -- --run

      - name: Build project
        run: npm run build
